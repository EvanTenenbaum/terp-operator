name: terp-agro-staging
region: sfo
services:
  - name: web
    github:
      repo: EvanTenenbaum/terp-operator
      branch: "__BRANCH__"
      deploy_on_push: true
    dockerfile_path: Dockerfile
    run_command: pnpm start:staging
    http_port: 8787
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/health
      initial_delay_seconds: 120
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 8
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: APP_ORIGIN
        scope: RUN_AND_BUILD_TIME
        value: "__APP_ORIGIN__"
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "8787"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "__DATABASE_URL__"
      - key: DATABASE_SSL
        scope: RUN_TIME
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        scope: RUN_TIME
        value: "false"
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "__SESSION_SECRET__"
      # NOTE: DO App Platform has no persistent filesystem volumes for App services.
      # Journal and archive data written here is ephemeral and will be wiped on
      # every redeploy. This is intentional for staging (demo-data only, see
      # deploy/staging/README.md). If durable audit logs are needed for a staging
      # environment, use the Droplet + Caddy alternative in deploy/staging/README.md
      # which mounts named Docker volumes via docker-compose.prod.yml (GH #312).
      - key: JOURNAL_DIR
        scope: RUN_TIME
        value: /workspace/storage/journal
      - key: ARCHIVE_DIR
        scope: RUN_TIME
        value: /workspace/storage/archives
      - key: VITE_TRPC_URL
        scope: RUN_AND_BUILD_TIME
        value: /trpc
      - key: VITE_SOCKET_URL
        scope: RUN_AND_BUILD_TIME
        value: /
      - key: VITE_AG_GRID_LICENSE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "__AG_GRID_LICENSE_KEY__"
      - key: VITE_CRIKKET_ENABLED
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: VITE_CRIKKET_HOST
        scope: RUN_AND_BUILD_TIME
        value: "https://terp-crikket-feedback.64.23.130.173.sslip.io"
      - key: VITE_CRIKKET_KEY
        scope: RUN_AND_BUILD_TIME
        value: "crk_terp_operator_feedback_do"
      - key: VITE_CRIKKET_SCRIPT_SRC
        scope: RUN_AND_BUILD_TIME
        value: /vendor/crikket/capture.global.js
