services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8787"
    volumes:
      - terp-agro-journal:/app/storage/journal
      - terp-agro-archives:/app/storage/archives

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-terp_agro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-terp_agro}
    volumes:
      - terp-agro-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-terp_agro} -d ${POSTGRES_DB:-terp_agro}"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  terp-agro-postgres:
  terp-agro-journal:
  terp-agro-archives:
