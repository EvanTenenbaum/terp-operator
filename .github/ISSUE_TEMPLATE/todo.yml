name: To-do
description: Track a small concrete follow-up with a clear action.
title: "To-do: "
labels:
  - "tracking:todo"
  - "status:needs-triage"
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What exactly needs to be done?
      placeholder: "Update..."
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it matters
      description: What risk, confusion, or missing capability does this remove?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Likely files / surfaces
      description: Add routes, components, commands, tests, docs, or workflows if known.
      placeholder: |
        - src/client/...
        - tests/e2e/...
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: |
        - [ ] Code updated
        - [ ] Verification run
        - [ ] Browser checked if UI-facing
    validations:
      required: true
