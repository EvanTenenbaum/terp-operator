- name: "tracking:known-issue"
  color: "d73a4a"
  description: "Confirmed or suspected bug, runtime failure, confusing UX, data drift, or test gap."
- name: "status:needs-triage"
  color: "fbca04"
  description: "Needs owner, priority, or scope decision."
- name: "status:ready"
  color: "0e8a16"
  description: "Ready for implementation."
- name: "status:blocked"
  color: "b60205"
  description: "Blocked by missing input, runtime, dependency, or decision."
- name: "status:in-progress"
  color: "5319e7"
  description: "Actively being worked."
- name: "status:verified"
  color: "006b75"
  description: "Closed or ready to close with evidence."
- name: "source:agent"
  color: "bfdadc"
  description: "Created or updated by an agent."
- name: "source:annotation"
  color: "c5def5"
  description: "Came from live annotation or screen feedback."
- name: "area:ux"
  color: "c2e0c6"
  description: "User experience or interface behavior."
- name: "area:runtime"
  color: "f9d0c4"
  description: "Runtime, server, browser, or environment behavior."
- name: "area:data"
  color: "d4c5f9"
  description: "Database, seed, fixture, migration, or data shape."
- name: "area:qa"
  color: "fef2c0"
  description: "Tests, verification, coverage, or release gates."
- name: "risk:high"
  color: "b60205"
  description: "High workflow, data, money, auth, or deploy risk."
