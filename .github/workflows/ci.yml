name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      # Phase 7 — credit-engine CI gate hardening (issue #68). Pin the
      # negative-role matrix + metrics unit tests as explicit CI steps so a
      # new credit-router procedure landing without a role gate (or a metric
      # rename) fails the build BEFORE typecheck/build masks it. These run
      # without a database — they stub pool.query.
      - run: pnpm exec vitest run src/server/routers/credit.negativeRoles.test.ts
      - run: pnpm exec vitest run src/server/services/creditEngine/metrics.test.ts
      # #133 — commandBus idempotency / journal-tx contract gate. PR #92
      # established atomic idempotency; PR #128 added 4 regressions for
      # post-commit observer isolation. Without an explicit pin these tests
      # were invisible to CI on green main, giving false confidence on
      # journal/command-bus changes. Stubbed (no DB).
      - run: pnpm exec vitest run src/server/services/commandBus.idempotency.test.ts
      - run: pnpm build
      # #34 — a11y sweep CI gate. Runs @axe-core/playwright against
      # dashboard, matchmaking, and inventory; fails the build on any
      # critical/serious WCAG 2.1 AA violation. Playwright needs the
      # Chromium browser binary on the runner.
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test tests/e2e/a11y.spec.ts
